version: '3.9'

services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: backend
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      # ✅ DB 연결
      RDS_ENDPOINT: ${RDS_ENDPOINT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # ✅ AWS 설정 (Spring 매핑 규칙에 맞게 변경)
      AWS_REGION: ${AWS_REGION}
      AWS_CREDENTIALS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_CREDENTIALS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}

      # ✅ JWT 등 앱 관련 설정
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: "--add-opens java.base/java.lang=ALL-UNNAMED"

    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

    # ✅ 앱 부팅 안정성을 위한 헬스체크
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: mysql:8.0
    container_name: hirehub-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: hirehub
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      APP_FRONT_REDIRECT_URL: ${APP_FRONT_REDIRECT_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

volumes:
  db_data:
